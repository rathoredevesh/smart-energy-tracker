name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-smoke:
    name: Backend Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Import FastAPI app
        run: python -c "from app.main import app; print(app.title)"

      - name: Verify GitHub Pages CORS
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app
          
          with TestClient(app) as client:
              response = client.get(
                  "/api/health",
                  headers={"Origin": "https://example.github.io"},
              )

          assert response.status_code == 200
          assert response.headers["access-control-allow-origin"] == "https://example.github.io"
          print("GitHub Pages CORS verified")
          PY

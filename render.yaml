previews:
  generation: automatic

services:
  - type: web
    name: smart-energy-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SMART_ENERGY_DB_PATH
        value: /opt/render/project/src/backend/data/smart_energy.db
    buildFilter:
      paths:
        - backend/**

  - type: web
    name: smart-energy-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    buildFilter:
      paths:
        - frontend/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
